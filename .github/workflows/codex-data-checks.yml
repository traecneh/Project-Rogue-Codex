name: Codex Data Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Tests and validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install browser smoke dependencies
        run: npm ci

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate Codex data
        run: python -m tools.codex_pipeline validate

      - name: Smoke test site pages
        run: python -m tools.codex_pipeline smoke-site --smoke-timeout-ms 60000

      - name: Check whitespace
        run: git diff --check
