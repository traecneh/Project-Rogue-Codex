name: Codex Data Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Tests and validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Python dependencies
        run: python -m pip install cryptography pillow

      - name: Install browser smoke dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          set +e
          python -m unittest discover -s tests -v 2>&1 | tee unittest-output.txt
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "### Unit test failure output"
              echo '```'
              tail -n 80 unittest-output.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            message=$(tail -n 25 unittest-output.txt | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=Unit tests failed::$message"
          fi
          exit "$status"

      - name: Validate Codex data
        run: python -m tools.codex_pipeline validate

      - name: Smoke test site pages
        run: python -m tools.codex_pipeline smoke-site --smoke-timeout-ms 60000

      - name: Check whitespace
        run: git diff --check
